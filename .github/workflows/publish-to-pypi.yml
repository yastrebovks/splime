name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      target:
        description: "Package index to publish to"
        required: true
        type: choice
        default: testpypi
        options:
          - testpypi
          - pypi

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package with test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run Ruff lint
        run: ruff check

      - name: Check Ruff formatting
        run: ruff format --check

      - name: Run mypy
        run: mypy --python-version 3.13 src

      - name: Run unit tests (smoke excluded)
        run: python -m pytest -m "not smoke" -q

  build:
    name: Build distribution
    needs:
      - test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build==1.5.0" twine

      - name: Check tag matches project version
        if: github.ref_type == 'tag'
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected_tag = f"v{version}"
          actual_tag = os.environ["GITHUB_REF_NAME"]
          if actual_tag != expected_tag:
              print(f"Tag {actual_tag!r} does not match project version {version!r}; expected {expected_tag!r}.")
              sys.exit(1)
          PY

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Check package metadata
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    needs:
      - build
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/splime/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    needs:
      - build
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/project/splime/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
