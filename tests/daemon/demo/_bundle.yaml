- !DFunction
  name: mk_random_formula
  inputs:
  - name: n_features
    type: null
    default: null
  - name: depth
    type: null
    default: null
  - name: seed
    type: null
    default: None
  outputs:
  - name: default
    type: null
  body: |-
    _ops = [op.add, op.sub, op.mul, op.truediv]
    rng = np.random.default_rng(seed=seed)

    def step(depth):
        xs = symbols(list(map('x{}'.format, range(n_features))))
        if depth == 0:
            return rng.choice(xs)
        else:
            result = rng.choice(_ops)(step(depth - 1), step(depth - 1))
            if result == sympy.zoo or result == 0:
                result = 1
            return result
    return step(depth)
