- !DFunction
  name: plot_errors
  inputs:
  - name: xs
    type: null
    default: null
  - name: ys_fact
    type: null
    default: null
  - name: ys_pred
    type: null
    default: null
  outputs:
  - name: default
    type: null
  body: |-
    x = xs[:, 0]
    roc_auc
    df = pd.DataFrame(dict(x=x, y_fact=ys_fact, y_pred=ys_pred)).assign(error=lambda df: df['y_fact'] - df['y_pred'], bin=lambda df: np.searchsorted(np.quantile(df['x'], np.linspace(0, 1, 1 + 10)[1:-1]), df['x']))
    dfg = df.groupby('bin')
    df = pd.concat([dfg['x'].agg(['min', 'max']).rename(lambda c: 'x_' + c, axis=1), *[dfg['error'].quantile(q).rename('y_q{:02.0f}'.format(q * 100)) for q in [0.25, 0.75]]], axis=1).reset_index()
    with BytesIO() as buf:
        fig, ax = plt.subplots(ncols=1, nrows=1, figsize=(8, 5))
        fig.tight_layout()
        height = 0.5
        ax.plot([0, 0], [df['bin'].min() - height, df['bin'].max() + height], color='k', linestyle=':')
        ax.barh(df['bin'] - height / 2.0, height=height, width=df['y_q75'] - df['y_q25'], left=df['y_q25'])
        ax.set_yticks(df['bin'])
        ax.set_yticklabels(list(df[['x_min', 'x_max']].apply(lambda xs: '[{:>5.2f}; {:>5.2f}]'.format(*xs), axis=1)))
        ax.set_title('error IQR by x0')
        fig.savefig(buf, format='png')
        plt.close()
        return buf.getvalue()
